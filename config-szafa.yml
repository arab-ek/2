# INSTRUKCJA TEKSTUR GŁÓWEK (NP. DO TYCH KOSTIUMÓW ALBO DO PETSOW):
# Użyj tekstury głowki z strony minesk.in
# 1. Wybierz główkę na stronie.
# 2. Skopiuj wartość z sekcji 'Value'.
# 3. Wklej do configu w pole 'value'.
#
# DOSTĘPNE EFEKTY DODATKOWE (W PETACH I PAPUGACH I KOSTIUMACH):
# Zmienne nazw efektow dodawaj w sekcji 'type' w configu ->
#
# --- EFEKTY STANDARDOWE ---
# - SPEED                   - Daje graczowi szybkość poruszania się.
# - INCREASE_DAMAGE         - Zwiększa zadawane obrażenia.
# - DAMAGE_RESISTANCE       - Zmniejsza otrzymywane obrażenia.
# - REGENERATION            - Powoli odnawia życie gracza.
# - FAST_DIGGING            - Przyspiesza kopanie bloków.
# - JUMP                    - Pozwala na wyższe skakanie.
# - FIRE_RESISTANCE         - Daje odporność na ogień i lawę.
# - WATER_BREATHING         - Pozwala oddychać pod wodą.
# - NIGHT_VISION            - Pozwala widzieć w ciemności.
# - INVISIBILITY            - Robi że gracz jest niewidzialny.
# - LUCK                    - Zwiększa szczęście (np. przy łowieniu ryb).
# - DOLPHINS_GRACE          - Przyspiesza pływanie w wodzie.
# - CONDUIT_POWER           - Daje efekty podwodne (widzenie i tlen).
# - ABSORPTION              - Daje dodatkowe złote serca jak po refie
# - SLOW                    - Spowalnia gracza.
#
# --- EFEKTY SPECJALNE ---
# - NO_HUNGER               - Gracz nigdy nie staje się głodny.
# - FALL_DAMAGE_RESISTANCE  - Zmniejsza obrażenia od upadku o 50%.
# - HEALTH_BOOST            - Dodaje stałe dodatkowe serca.
#
# --- PRZYKŁAD UŻYCIA W PETACH ---
# gui_pets:
#   items:
#     nazwa_peta:
#       effects:
#         - type: SPEED
#           amplifier: 1  # Poziom efektu (0 = I, 1 = II itp)

